<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <title>AIS Live — Transferts STS</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #ff6e40; --accent-bg: #150905; --accent-dim: #1e1008;
      --gold: #c9a227; --gold-bg: #100e06; --gold-dim: #6e5512;
      --navy: #030c1c; --surface: #060f24; --border: #152d4f;
      --text: #ccd9e8; --text-dim: #4e6a88;
    }

    body {
      background: var(--navy); color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    header {
      background: linear-gradient(to bottom, #071220, var(--navy));
      border-top: 3px solid transparent;
      border-image: linear-gradient(to right, #002395 33.3%, #ffffff 33.3% 66.6%, #ed2939 66.6%) 1 0 0 0;
      border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 60px;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
      box-shadow: 0 2px 24px rgba(0,15,60,.6);
    }
    .logo {
      font-family: 'Exo 2', sans-serif; font-size: 14px; font-weight: 700;
      letter-spacing: .06em; color: var(--text); display: flex; align-items: center; gap: 10px;
    }
    .logo-anchor { color: var(--gold); font-size: 20px; }
    .logo-title  { color: var(--gold); font-weight: 900; letter-spacing: .08em; }
    .logo-sep    { color: var(--border); }
    .logo-sub    { font-weight: 400; color: var(--text-dim); font-size: 11px; letter-spacing: .04em; }

    .nav { display: flex; gap: 5px; margin-left: 18px; }
    .nav a {
      font-family: 'Exo 2', sans-serif;
      font-size: 11px; font-weight: 600; padding: 4px 13px; border-radius: 20px;
      text-decoration: none; border: 1px solid var(--border); color: var(--text-dim);
      transition: all .2s; letter-spacing: .03em;
    }
    .nav a:hover { color: var(--text); border-color: #1e4070; background: #0b1a30; }
    .nav a.active {
      background: linear-gradient(to bottom, #181405, var(--gold-bg));
      color: var(--gold); border-color: var(--gold-dim);
      box-shadow: 0 0 10px rgba(201,162,39,.18);
    }

    #status {
      font-size: 12px; margin-left: 14px; padding: 3px 9px;
      border-radius: 20px; background: #21262d; color: #6e7681;
    }
    #status.ok  { color: #3fb950; background: #0d2a15; }
    #status.err { color: #f85149; background: #2d1b1b; }

    .stats { display: flex; gap: 28px; }
    .stat { text-align: center; }
    .stat-val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .stat-lbl { font-size: 10px; color: #6e7681; letter-spacing: .08em; margin-top: 1px; }

    .main { display: flex; flex: 1; overflow: hidden; }
    #map { flex: 1; }

    .sidebar {
      width: 440px; background: #060f24; border-left: 1px solid #152d4f;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sb-head {
      padding: 10px 14px; border-bottom: 1px solid #152d4f;
      font-size: 11px; color: #8b949e; letter-spacing: .1em;
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .sb-head-title { color: var(--accent); font-weight: 700; font-size: 12px; }
    #clear-btn {
      font-size: 10px; background: none; border: 1px solid #152d4f;
      color: #6e7681; padding: 2px 8px; border-radius: 4px; cursor: pointer;
    }
    #clear-btn:hover { color: #e6edf3; border-color: var(--accent); }
    #mute-btn {
      font-size: 10px; background: none; border: 1px solid #152d4f;
      color: #6e7681; padding: 2px 8px; border-radius: 4px; cursor: pointer; min-width: 54px;
    }
    #mute-btn.muted { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

    .cards { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .cards::-webkit-scrollbar { width: 4px; }
    .cards::-webkit-scrollbar-thumb { background: #152d4f; border-radius: 2px; }

    .card {
      background: #030c1c; border: 1px solid #ff6e4033;
      border-radius: 8px; border-left: 4px solid var(--accent);
      padding: 12px 14px; cursor: pointer; transition: background .15s;
    }
    .card:hover { background: #1a0d08; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .card-badge {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      color: var(--accent); background: var(--accent-bg);
      border: 1px solid var(--accent)66; border-radius: 4px;
      padding: 2px 8px; flex-shrink: 0;
    }
    .card-time { font-size: 10px; color: #6e7681; }

    .vessels-row {
      display: flex; align-items: center; gap: 8px; margin: 8px 0;
    }
    .vessel-box {
      flex: 1; background: #060f24; border: 1px solid #152d4f;
      border-radius: 6px; padding: 8px 10px;
    }
    .vessel-name { font-size: 13px; font-weight: 700; color: #e6edf3; }
    .vessel-meta { font-size: 10px; color: #6e7681; margin-top: 2px; }
    .vs-sep {
      font-size: 18px; color: var(--accent); font-weight: 700; flex-shrink: 0;
    }

    .sts-metrics {
      display: flex; gap: 8px; margin: 6px 0;
    }
    .metric {
      flex: 1; background: var(--accent-dim); border: 1px solid var(--accent)44;
      border-radius: 6px; padding: 6px 10px; text-align: center;
    }
    .metric-val { font-size: 16px; font-weight: 700; color: var(--accent); }
    .metric-lbl { font-size: 9px; color: #8b949e; letter-spacing: .08em; margin-top: 1px; }

    .sts-detail {
      font-size: 11px; color: #c9d1d9; line-height: 1.6;
      background: #030c1c; border-radius: 6px; padding: 8px 10px;
      border: 1px solid #152d4f; margin-top: 6px;
    }

    .card-pos { font-size: 10px; color: #6e7681; margin-top: 6px; }

    .risk-bar-wrap {
      display:inline-block; width:60px; height:5px; background:#21262d;
      border-radius:3px; vertical-align:middle; margin-left:6px; overflow:hidden;
    }
    .risk-bar { height:100%; border-radius:3px; transition:width .3s; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: #3d444d;
      font-size: 13px; gap: 12px;
    }
    .empty-state span { font-size: 40px; }

    @keyframes flash { 0%{background:#2a1208} 100%{background:#030c1c} }
    .flash { animation: flash 1.5s ease-out; }

    .nav-badge {
      display:inline-block; background:#ff6e40; color:#fff; border-radius:10px;
      font-size:9px; font-weight:700; padding:1px 5px; margin-left:4px; vertical-align:middle;
    }

    /* Risk zones */
    .leaflet-tooltip { background:#060f24; border:1px solid #152d4f; color:#e6edf3; font-size:11px; }

    /* Minimap legend */
    .map-legend {
      position: absolute; bottom: 24px; left: 12px; z-index: 500;
      background: #060f24cc; border: 1px solid #152d4f; border-radius: 6px;
      padding: 8px 12px; font-size: 10px; color: #8b949e;
    }
    .legend-dot {
      display:inline-block; width:10px; height:10px; border-radius:50%;
      margin-right:5px; vertical-align:middle;
    }
  </style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center">
    <div class="logo"><span class="logo-anchor">⚓</span><span class="logo-title">MARINE NATIONALE</span><span class="logo-sep">·</span><span class="logo-sub">MICA CENTER — TRANSFERTS STS</span></div>
    <nav class="nav">
      <a href="dashboard.html">Tous</a>
      <a href="dashboard_clean.html">✅ Clean</a>
      <a href="dashboard_suspects.html">⚠ Suspects</a>
      <a href="dashboard_alertes.html">🚨 Alertes</a>
      <a href="dashboard_sts.html" class="active">📦 STS <span id="sts-badge" class="nav-badge" style="display:none">0</span></a>
      <a href="stats.html">📊 Stats</a>
      <a href="dashboard_settings.html">⚙ Paramètres</a>
    </nav>
    <span id="status">● Connexion…</span>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">STS DÉTECTÉS</div></div>
    <div class="stat"><div class="stat-val" id="s-active">0</div><div class="stat-lbl">PAIRES ACTIVES</div></div>
    <div class="stat"><div class="stat-val" id="s-min-dist">—</div><div class="stat-lbl">DIST MIN (m)</div></div>
    <div class="stat"><div class="stat-val" id="s-rate">0</div><div class="stat-lbl">MSG/S</div></div>
  </div>
</header>
<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sb-head">
      <span class="sb-head-title">📦 TRANSFERTS STS — TEMPS RÉEL</span>
      <div style="display:flex;gap:6px">
        <button id="mute-btn" class="muted" onclick="toggleMute()">🔇 Muet</button>
        <button id="clear-btn" onclick="clearCards()">✕ Vider</button>
      </div>
    </div>
    <div class="cards" id="cards">
      <div class="empty-state" id="empty">
        <span>📦</span>
        En attente de transferts STS…
      </div>
    </div>
  </div>
</div>

<script>
const map = L.map('map', { center: [20, 20], zoom: 2 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 18
}).addTo(map);

// ── Zones à risque ─────────────────────────────────────────────────────────
const RISK_ZONES = [
  {name:'Golfe de Guinée',               lat:[-5,7],   lon:[-5,15],   color:'#f85149'},
  {name:'Golfe Persique / Iran',         lat:[23,30],  lon:[48,57],   color:'#f85149'},
  {name:'Bab-el-Mandeb / Mer Rouge sud', lat:[11,16],  lon:[41,48],   color:'#f85149'},
  {name:'Mer Rouge nord',                lat:[16,30],  lon:[32,44],   color:'#d29922'},
  {name:'Détroit de Malacca',            lat:[1,6],    lon:[98,105],  color:'#d29922'},
  {name:'Eaux nord-coréennes',           lat:[36,43],  lon:[124,132], color:'#f85149'},
  {name:'Côtes somaliennes',             lat:[2,15],   lon:[41,52],   color:'#d29922'},
];
RISK_ZONES.forEach(z => {
  L.rectangle([[z.lat[0], z.lon[0]], [z.lat[1], z.lon[1]]], {
    color: z.color, weight: 1.5, opacity: 0.7,
    fillColor: z.color, fillOpacity: 0.08,
    dashArray: '4 4', interactive: true
  }).bindTooltip(`⚠ ${z.name}`, { permanent: false, direction: 'center',
    className: 'leaflet-tooltip' }).addTo(map);
});

// ── Légende carte ─────────────────────────────────────────────────────────
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = () => {
  const d = L.DomUtil.create('div', 'map-legend');
  d.innerHTML = `
    <div><span class="legend-dot" style="background:#ff6e40;box-shadow:0 0 6px #ff6e4088"></span>Paire STS active</div>
    <div style="margin-top:4px"><span class="legend-dot" style="background:#ff6e4066;border:1px solid #ff6e40"></span>Zone de contact</div>`;
  return d;
};
legend.addTo(map);

// ── État ───────────────────────────────────────────────────────────────────
let total = 0;
let minDist = Infinity;
let activePairs = 0;
let msgCount = 0;
let muted = true;
const circles = {};   // key = "mmsi1-mmsi2" → L.circle
const markers = {};

setInterval(() => {
  document.getElementById('s-rate').textContent = msgCount;
  msgCount = 0;
}, 1000);

function riskBar(score) {
  const pct = Math.min(100, (score / 10) * 100);
  const color = score >= 7 ? '#f85149' : score >= 4 ? '#ff6e40' : '#d29922';
  return `<span class="risk-bar-wrap"><span class="risk-bar" style="width:${pct}%;background:${color}"></span></span>`;
}

function timeAgo(epoch) {
  if (!epoch) return '';
  const diff = Math.floor(Date.now() / 1000 - epoch);
  if (diff < 60)   return `il y a ${diff}s`;
  if (diff < 3600) return `il y a ${Math.floor(diff / 60)} min`;
  return `il y a ${Math.floor(diff / 3600)}h`;
}

function addCard(d) {
  document.getElementById('empty').style.display = 'none';
  total++;
  document.getElementById('s-total').textContent = total;

  if (d.dist_m < minDist) {
    minDist = d.dist_m;
    document.getElementById('s-min-dist').textContent = d.dist_m;
  }

  const card = document.createElement('div');
  card.className = 'card flash';
  card.innerHTML = `
    <div class="card-top">
      <div class="card-badge">📦 TRANSFERT STS</div>
      <div class="card-time" data-epoch="${d.ts_epoch}">${timeAgo(d.ts_epoch)}</div>
    </div>
    <div class="vessels-row">
      <div class="vessel-box">
        <div class="vessel-name">${d.flag || ''} ${d.name}</div>
        <div class="vessel-meta">MMSI ${d.mmsi} · ${d.country || ''}</div>
      </div>
      <div class="vs-sep">↔</div>
      <div class="vessel-box">
        <div class="vessel-name">${d.flag2 || ''} ${d.name2}</div>
        <div class="vessel-meta">MMSI ${d.mmsi2} · ${d.country2 || ''}</div>
      </div>
    </div>
    <div class="sts-metrics">
      <div class="metric">
        <div class="metric-val">${d.dist_m}</div>
        <div class="metric-lbl">DISTANCE (m)</div>
      </div>
      <div class="metric">
        <div class="metric-val">${d.duration_min}</div>
        <div class="metric-lbl">DURÉE (min)</div>
      </div>
      <div class="metric">
        <div class="metric-val" style="display:flex;align-items:center;justify-content:center">
          ${(d.risk_score || 4.5).toFixed(1)} ${riskBar(d.risk_score || 4.5)}
        </div>
        <div class="metric-lbl">SCORE RISQUE</div>
      </div>
    </div>
    <div class="sts-detail">${d.alert_details[0].detail}</div>
    <div class="card-pos">📍 ${d.lat.toFixed(3)}°, ${d.lon.toFixed(3)}°</div>
  `;
  card.onclick = () => { map.setView([d.lat, d.lon], 9); };
  const container = document.getElementById('cards');
  container.insertBefore(card, container.firstChild);
  while (container.children.length > 80) container.removeChild(container.lastChild);
}

function clearCards() {
  document.getElementById('cards').innerHTML =
    '<div class="empty-state" id="empty"><span>📦</span>En attente de transferts STS…</div>';
  minDist = Infinity;
  document.getElementById('s-min-dist').textContent = '—';
}

// ── Audio ─────────────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function toggleMute() {
  muted = !muted;
  const btn = document.getElementById('mute-btn');
  btn.textContent = muted ? '🔇 Muet' : '🔔 Son';
  btn.className   = muted ? 'muted' : '';
}

function beep(f=880, dur=0.3, vol=0.4) {
  if (muted) return;
  try {
    if (!audioCtx) audioCtx = new AudioCtx();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = f;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

// ── Notifications push ────────────────────────────────────────────────────
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
function pushNotif(title, body) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try { new Notification(title, { body, silent: false }); } catch(e) {}
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connect() {
  const ws = new WebSocket('ws://localhost:8765');
  const statusEl = document.getElementById('status');
  ws.onopen  = () => { statusEl.textContent = '● CONNECTÉ'; statusEl.className = 'ok'; };
  ws.onclose = () => { statusEl.textContent = '● Reconnexion…'; statusEl.className = 'err'; setTimeout(connect, 3000); };

  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    msgCount++;

    if (d.event_type !== 'sts') return;

    beep(880, 0.3, 0.45);
    pushNotif('📦 STS détecté',
      `${d.flag||''} ${d.name} ↔ ${d.flag2||''} ${d.name2} — ${d.dist_m}m / ${d.duration_min}min`);

    if (document.hidden) {
      const badge = document.getElementById('sts-badge');
      badge.style.display = 'inline-block';
      badge.textContent = parseInt(badge.textContent || '0') + 1;
    }

    // Cercle sur la carte centré entre les deux navires
    const pairKey = [d.mmsi, d.mmsi2].sort().join('-');
    if (circles[pairKey]) map.removeLayer(circles[pairKey]);
    circles[pairKey] = L.circle([d.lat, d.lon], {
      radius: Math.max(500, d.dist_m * 2),
      color: '#ff6e40', weight: 2, opacity: 0.9,
      fillColor: '#ff6e40', fillOpacity: 0.12,
    }).bindPopup(`
      <b style="color:#ff6e40">📦 Transfert STS</b><br>
      ${d.flag||''} <b>${d.name}</b> (${d.mmsi})<br>
      ↔ ${d.flag2||''} <b>${d.name2}</b> (${d.mmsi2})<br>
      <span style="color:#aaa">Distance : ${d.dist_m} m · Durée : ${d.duration_min} min</span>
    `, { maxWidth: 300 }).addTo(map);

    // Ping central
    const ping = L.circleMarker([d.lat, d.lon], {
      radius: 8, color: '#ff6e40', weight: 2,
      fillColor: '#ff6e40', fillOpacity: 0.8,
    }).addTo(map);
    setTimeout(() => map.removeLayer(ping), 30000);

    activePairs++;
    document.getElementById('s-active').textContent = activePairs;

    addCard(d);
    map.setView([d.lat, d.lon], 8);
  };
}
connect();

// ── Timestamps relatifs ───────────────────────────────────────────────────
setInterval(() => {
  document.querySelectorAll('[data-epoch]').forEach(el => {
    el.textContent = timeAgo(parseInt(el.dataset.epoch));
  });
}, 30000);
</script>
</body>
</html>
